<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orlando Neighborhood Matchmaker | SERHANT. Orlando</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
    <script type="module" crossorigin src="./assets/index-DVwKkosQ.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var LEAD_API = 'https://matchmaker-lead-notify.mark-bd2.workers.dev';
        var sent = false;

        document.addEventListener('click', function(e) {
          if (sent) return;
          var btn = e.target;
          if (!btn || !btn.textContent) return;
          var text = btn.textContent.trim();
          if (text !== 'Send My Guide') return;

          var parent = btn.closest('div');
          if (!parent) return;
          var inputs = parent.querySelectorAll('input');
          var formData = {};
          inputs.forEach(function(inp) {
            if (inp.type === 'email') formData.email = inp.value;
            else if (inp.type === 'tel') formData.phone = inp.value;
            else if (inp.type === 'text') formData.name = inp.value;
          });

          if (!formData.email) return;

          var agent = window.__MATCHMAKER_AGENT;
          var neighborhood = '';
          var matchScore = '';
          var h1s = document.querySelectorAll('h1');
          if (h1s.length > 0) neighborhood = h1s[0].textContent.trim();
          var allText = document.body.innerText;
          var scoreMatch = allText.match(/(\d+)%\s*Match/);
          if (scoreMatch) matchScore = scoreMatch[1];

          sent = true;

          // Send to Cloudflare Worker
          fetch(LEAD_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              leadName: formData.name || '',
              leadEmail: formData.email,
              leadPhone: formData.phone || '',
              agentName: agent ? agent.name : '',
              agentEmail: agent ? agent.email : '',
              agentSlug: agent ? agent.slug : '',
              neighborhood: neighborhood,
              matchScore: matchScore
            })
          }).then(function(r) { return r.json(); })
          .then(function(d) { console.log('Lead sent:', d); })
          .catch(function(err) { console.error('Lead error:', err); sent = false; });

          // Also send to parent LP page
          if (window.parent !== window) {
            window.parent.postMessage({
              type: 'matchmaker-lead',
              leadName: formData.name || '',
              leadEmail: formData.email,
              leadPhone: formData.phone || '',
              agentName: agent ? agent.name : '',
              agentEmail: agent ? agent.email : '',
              agentSlug: agent ? agent.slug : '',
              neighborhood: neighborhood,
              matchScore: matchScore
            }, '*');
          }
        }, true);
      })();
    </script>
  </body>
</html>
